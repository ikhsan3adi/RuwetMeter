services:
  backend:
    build:
      context: ./backend
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "bun run db:migrate && bun run src/index.ts"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ruwetmeter
      POSTGRES_USER: ruwet
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init-vector.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ruwet -d ruwetmeter']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
